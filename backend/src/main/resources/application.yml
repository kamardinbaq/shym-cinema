spring:
  application:
    name: horror-cinema

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/horror_cinema}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in ms

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://cinema-phi-gilt.vercel.app}

  rate-limit:
    requests-per-minute: 30

  session-price: ${SESSION_PRICE:3500}  # flat price in KZT for all rooms


logging:
  level:
    com.cinema: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
