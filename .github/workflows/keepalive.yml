name: Keep Render alive

on:
  schedule:
    # Wake-up ping at 07:50 Almaty (02:50 UTC) — warms it up before the active window
    - cron: '50 2 * * *'
    # Every 10 min during active hours: 08:00–03:00 Almaty (03:00–22:00 UTC)
    - cron: '*/10 3-21 * * *'
  workflow_dispatch:   # lets you trigger manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -fsS --max-time 30 \
            https://dark-cinema.onrender.com/actuator/health
