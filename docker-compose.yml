# DEV WORKFLOW
# First run:           docker-compose up --build
# Normal development:  docker-compose up
# Stop:                docker-compose stop
# Full reset:          docker-compose down

services:

  postgres:
    image: postgres:15-alpine
    container_name: horror_cinema_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: horror_cinema
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: horror_cinema_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/horror_cinema
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ROOT_ADMIN_USERNAME: ${ROOT_ADMIN_USERNAME}
      ROOT_ADMIN_PASSWORD: ${ROOT_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: horror_cinema_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:

